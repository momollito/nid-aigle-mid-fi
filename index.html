
<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Refuge du Nid d'Aigle — Wireframe mid-fi</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f3f2ee;
    --paper: #ffffff;
    --ink: #2a2a28;
    --muted: #8a887f;
    --line: #d6d3ca;
    --line-strong: #b9b6ac;
    --fill: #e6e4dc;       /* body-text placeholder bars */
    --fill-soft: #eceae3;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e7e5df; color: var(--ink); font-family: 'JetBrains Mono', monospace; }
  body { min-height: 100vh; }

  .meta {
    min-height: 100vh;
    padding: 26px 24px 70px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .meta-head {
    width: 100%; max-width: 1320px;
    display: flex; justify-content: space-between; align-items: center; gap: 24px;
    font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em;
  }
  .meta-head .title {
    font-family: 'Instrument Serif', serif; font-style: italic; font-size: 24px;
    text-transform: none; letter-spacing: 0; color: var(--ink);
  }
  .meta-head .title span {
    font-family: 'JetBrains Mono', monospace; font-style: normal; font-size: 10px;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-left: 10px;
  }
  .nav-tabs { display: flex; gap: 3px; background: var(--paper); border: 1px solid var(--line); border-radius: 999px; padding: 4px; }
  .nav-tabs button {
    background: transparent; border: none; color: var(--ink);
    padding: 8px 14px; border-radius: 999px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
  }
  .nav-tabs button.active { background: var(--ink); color: var(--paper); }

  .device-shell {
    background: var(--paper);
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 24px 50px -30px rgba(0,0,0,0.22);
    width: 1280px; height: 820px;
  }
  .page-frame {
    width: 100%; height: 100%;
    overflow-y: auto; overflow-x: hidden;
    background: var(--bg); position: relative; scroll-behavior: smooth;
  }
  .page-frame::-webkit-scrollbar { width: 8px; }
  .page-frame::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }

  /* ---- primitives ---- */
  .eyebrow { font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .serif { font-family: 'Instrument Serif', serif; font-weight: 400; letter-spacing: -0.01em; line-height: 1.04; color: var(--ink); }
  .serif em { font-style: italic; }

  .ph {
    border: 1px solid var(--line-strong);
    border-radius: 4px;
    background:
      repeating-linear-gradient(135deg, transparent 0 13px, rgba(42,42,40,0.045) 13px 14px),
      var(--fill-soft);
    position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .ph.dark {
    background:
      repeating-linear-gradient(135deg, transparent 0 13px, rgba(255,255,255,0.05) 13px 14px),
      #4a4843;
    border-color: #3a3835;
  }
  .ph .cap {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
    background: rgba(255,255,255,0.92); border: 1px solid var(--line); border-radius: 2px;
    padding: 4px 10px; color: var(--ink); position: relative; z-index: 2;
  }
  .ph.dark .cap { background: rgba(30,30,28,0.7); border-color: #555; color: #f0efe9; }

  .bar { background: var(--fill); border-radius: 2px; height: 9px; }
  .bar.soft { background: var(--fill-soft); }

  .chip {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--line-strong); border-radius: 999px; padding: 6px 13px;
    background: var(--paper); font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink);
  }
  .btn {
    border: 1px solid var(--ink); background: var(--paper); color: var(--ink);
    padding: 11px 20px; border-radius: 999px; cursor: pointer;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase;
  }
  .btn.primary { background: var(--ink); color: var(--paper); }

  .field { border: 1px solid var(--line-strong); border-radius: 3px; background: #faf9f6; }
  .divider { height: 1px; background: var(--line); }
  .divider.strong { height: 1px; background: var(--line-strong); }

  #app-root { min-height: 100vh; }
</style>
</head>
<body>

<div id="app-root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

// ===== body-text placeholder (the "sans texte" part) =====
function Lines({ count = 3, widths = ['100%','94%','78%'], gap = 9, h = 8 }) {
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap }}>
      {Array.from({ length: count }).map((_, i) => (
        <div key={i} className="bar" style={{ width: widths[i % widths.length], height: h }} />
      ))}
    </div>
  );
}

function ImgBox({ label, height, dark = false, style = {} }) {
  return (
    <div className={"ph" + (dark ? " dark" : "")} style={{ height, ...style }}>
      <span className="cap">{label}</span>
    </div>
  );
}

// ===== Nav =====
function NavPill({ current, onNav }) {
  const items = [
    { id: 'tarifs', label: 'Tarifs & Réservation' },
    { id: 'about', label: 'À propos' },
  ];
  return (
    <header style={{ position: 'absolute', top: 22, left: 0, right: 0, zIndex: 30, display: 'flex', justifyContent: 'center' }}>
      <nav style={{
        background: 'rgba(255,255,255,0.96)', backdropFilter: 'blur(8px)',
        border: '1px solid var(--line-strong)', borderRadius: 999,
        padding: '8px 8px 8px 22px', display: 'flex', alignItems: 'center', gap: 24,
        boxShadow: '0 6px 20px -10px rgba(0,0,0,0.18)',
      }}>
        <a href="#" onClick={(e) => { e.preventDefault(); onNav('home'); }} style={{
          display: 'flex', alignItems: 'center', gap: 8, textDecoration: 'none', color: 'var(--ink)',
          fontFamily: 'Instrument Serif, serif', fontStyle: 'italic', fontSize: 19,
        }}>
          <span style={{ width: 14, height: 14, border: '1.5px solid var(--ink)', borderRadius: 99, display: 'inline-block' }} />
          Nid d'Aigle
        </a>
        {items.map(it => (
          <a key={it.id} href="#" onClick={(e) => { e.preventDefault(); onNav(it.id); }} style={{
            textDecoration: 'none', color: current === it.id ? 'var(--ink)' : 'var(--muted)',
            fontFamily: 'system-ui, -apple-system, sans-serif', fontSize: 13,
          }}>{it.label}</a>
        ))}
        <button className="btn primary" onClick={() => onNav('contact')} style={{ fontFamily: 'system-ui, -apple-system, sans-serif', fontSize: 13, letterSpacing: 0, textTransform: 'none' }}>Contact</button>
      </nav>
    </header>
  );
}

function Footer({ onNav }) {
  return (
    <footer style={{ borderTop: '1px solid var(--line-strong)', padding: '46px 8% 30px', background: '#efede6', display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 30 }}>
      <div>
        <div className="serif" style={{ fontStyle: 'italic', fontSize: 22, marginBottom: 8 }}>Refuge du Nid d'Aigle</div>
        <div className="eyebrow">2 372 m · Massif du Mont-Blanc</div>
      </div>
      {[
        { t: 'Navigation', items: ['Accueil','Tarifs & Réservation','À propos','Contact'] },
        { t: 'Contact', n: 3 },
        { t: 'Saison', n: 2 },
      ].map((c, ci) => (
        <div key={ci}>
          <div className="eyebrow" style={{ marginBottom: 14 }}>{c.t}</div>
          {c.items ? (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {c.items.map(it => (
                <a key={it} href="#" onClick={(e) => { e.preventDefault(); onNav({'Accueil':'home','Tarifs & Réservation':'tarifs','À propos':'about','Contact':'contact'}[it]); }} style={{ color: 'var(--ink)', textDecoration: 'none', fontSize: 12 }}>{it}</a>
              ))}
            </div>
          ) : <Lines count={c.n} widths={['80%','60%','70%']} h={6} />}
        </div>
      ))}
      <div style={{ gridColumn: '1 / -1', borderTop: '1px solid var(--line)', paddingTop: 18, marginTop: 10 }} className="eyebrow">© 2026 — Wireframe mid-fi · 45.892° N · 6.794° E</div>
    </footer>
  );
}

// ===== Pages =====
function PageHome({ onNav }) {
  return (
    <div>
      {/* Hero */}
      <section style={{ position: 'relative', height: 700 }}>
        <ImgBox label="Photo refuge 'Wow'" height="100%" dark style={{ position: 'absolute', inset: 0, borderRadius: 0, border: 'none', borderBottom: '1px solid var(--line-strong)' }} />
        {/* gradient overlay bottom */}
        <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(to top, rgba(20,19,18,0.82) 0%, rgba(20,19,18,0.2) 45%, transparent 70%)', zIndex: 1 }} />

        {/* bottom-left: eyebrow + title + CTA */}
        <div style={{ position: 'absolute', left: 0, bottom: 0, padding: '0 52px 44px', zIndex: 2, maxWidth: 720 }}>
          <div className="eyebrow" style={{ color: '#b8b5ad', marginBottom: 16 }}>Géré par des passionnés · Depuis 1961</div>
          <h1 className="serif" style={{ fontSize: 76, margin: '0 0 28px', color: '#f4f3ef', lineHeight: 1.0 }}>
            Une nuit suspendue<br /><em>au seuil des glaciers.</em>
          </h1>
          <button className="btn primary" onClick={() => onNav('tarifs')}>Réserver une nuitée</button>
        </div>

        {/* bottom-right: stats */}
        <div style={{ position: 'absolute', right: 0, bottom: 0, padding: '0 52px 44px', zIndex: 2, display: 'flex', flexDirection: 'column', gap: 18, alignItems: 'flex-end' }}>
          {[['Altitude','2 372 m'],['Couchages','28'],['Saison','Juin → Sept.'],['Accès','TMB · Sentier']].map(([k,v]) => (
            <div key={k} style={{ display: 'flex', flexDirection: 'column', gap: 2, alignItems: 'flex-end' }}>
              <span className="eyebrow" style={{ color: '#8a8780' }}>{k}</span>
              <span className="serif" style={{ fontStyle: 'italic', fontSize: 20, color: '#f4f3ef' }}>{v}</span>
            </div>
          ))}
        </div>
      </section>

      {/* Intro */}
      <section style={{ padding: '100px 8%', display: 'grid', gridTemplateColumns: '1fr 1.4fr', gap: 80, alignItems: 'start' }}>
        <div>
          <div className="eyebrow">01 / Le refuge</div>
          <h2 className="serif" style={{ fontSize: 54, margin: '14px 0 0' }}>Un point d'étape. <em>Une destination.</em></h2>
        </div>
        <div style={{ maxWidth: 620, display: 'flex', flexDirection: 'column', gap: 20 }}>
          <Lines count={4} />
          <Lines count={3} widths={['100%','88%','64%']} />
          <div style={{ marginTop: 8 }}><a href="#" onClick={(e) => { e.preventDefault(); onNav('about'); }} className="eyebrow" style={{ color: 'var(--ink)', textDecoration: 'none', borderBottom: '1px solid var(--ink)', paddingBottom: 3 }}>Lire l'histoire →</a></div>
        </div>
      </section>

      {/* Triptych */}
      <section style={{ padding: '0 8% 100px' }}>
        <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr 1fr', gap: 12, height: 440 }}>
          <ImgBox label="Vue extérieure · façade" height="100%" />
          <div style={{ display: 'grid', gridTemplateRows: '1fr 1fr', gap: 12 }}>
            <ImgBox label="Salle commune" height="100%" />
            <ImgBox label="Dortoir" height="100%" />
          </div>
          <ImgBox label="Glacier au crépuscule" height="100%" dark />
        </div>
      </section>

      {/* Cards */}
      <section style={{ padding: '0 8% 120px' }}>
        <div style={{ marginBottom: 28 }}>
          <div className="eyebrow">02 / Préparer votre venue</div>
          <h2 className="serif" style={{ fontSize: 46, margin: '10px 0 0' }}>Trois choses à savoir avant de monter.</h2>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
          {[['01','Tarifs & Réservation','tarifs'],['02','Accès','contact'],['03','À propos','about']].map(([n,t,target]) => (
            <article key={n} onClick={() => onNav(target)} style={{ background: 'var(--paper)', border: '1px solid var(--line-strong)', borderRadius: 4, padding: 28, cursor: 'pointer', display: 'flex', flexDirection: 'column', gap: 14, minHeight: 220 }}>
              <span className="eyebrow">{n}</span>
              <h3 className="serif" style={{ fontSize: 30, margin: 0 }}>{t}</h3>
              <Lines count={3} widths={['100%','90%','55%']} h={7} />
              <span className="eyebrow" style={{ marginTop: 'auto' }}>En savoir plus →</span>
            </article>
          ))}
        </div>
      </section>

      <Footer onNav={onNav} />
    </div>
  );
}

function PageTarifsReservation({ onNav }) {
  const rows = ['Nuitée seule','Demi-pension','Pension complète','Repas seul','Petit-déjeuner','Pique-nique'];
  return (
    <div>
      {/* Header */}
      <section style={{ padding: '130px 8% 50px', borderBottom: '1px solid var(--line-strong)' }}>
        <div className="eyebrow">02 / Tarifs & Réservation · Saison 2026</div>
        <h1 className="serif" style={{ fontSize: 84, margin: '14px 0 0' }}>Tarifs <em>transparents</em>,<br />réservation directe.</h1>
        <div style={{ marginTop: 24, maxWidth: 540 }}><Lines count={2} widths={['100%','72%']} /></div>
      </section>

      {/* Grille tarifaire */}
      <section style={{ padding: '70px 8% 0' }}>
        <div className="eyebrow" style={{ marginBottom: 28 }}>Grille tarifaire</div>
        <div style={{ border: '1px solid var(--line-strong)', borderRadius: 4, background: 'var(--paper)', overflow: 'hidden' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', background: '#ecebe4', borderBottom: '1px solid var(--line-strong)' }}>
            {['Prestation','Adulte','Enfant -12 ans','FFCAM'].map((h, i) => (
              <div key={h} className="eyebrow" style={{ padding: '18px 22px', textAlign: i===0?'left':'right' }}>{h}</div>
            ))}
          </div>
          {rows.map((r, i) => (
            <div key={r} style={{ display: 'grid', gridTemplateColumns: '2fr 1fr 1fr 1fr', borderBottom: i < rows.length-1 ? '1px solid var(--line)' : 'none' }}>
              <div style={{ padding: '20px 22px' }}>
                <div className="serif" style={{ fontSize: 22 }}>{r}</div>
                <div style={{ marginTop: 8 }}><div className="bar soft" style={{ width: 200, height: 6 }} /></div>
              </div>
              {[0,1,2].map(j => (
                <div key={j} style={{ padding: '20px 22px', display: 'flex', alignItems: 'center', justifyContent: 'flex-end' }}>
                  <div className="bar" style={{ width: 46, height: 8 }} />
                </div>
              ))}
            </div>
          ))}
        </div>

        {/* Notes tarifaires */}
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 24, marginTop: 50 }}>
          {[['A','Groupes (8+)'],['B','Enfants -5 ans'],['C','Membres FFCAM']].map(([n,t]) => (
            <div key={n} style={{ borderTop: '1px solid var(--line-strong)', paddingTop: 18 }}>
              <div className="eyebrow">Note · {n}</div>
              <h4 className="serif" style={{ fontSize: 22, margin: '8px 0 10px' }}>{t}</h4>
              <Lines count={3} widths={['100%','90%','60%']} h={7} />
            </div>
          ))}
        </div>
      </section>

      {/* Séparateur */}
      <div style={{ margin: '80px 8% 0', height: 1, background: 'var(--line-strong)' }} />

      {/* Réservation */}
      <section style={{ padding: '70px 8% 110px', display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 80, alignItems: 'start' }}>
        <div>
          <div className="eyebrow">Réservation en ligne</div>
          <h2 className="serif" style={{ fontSize: 46, margin: '12px 0 28px' }}>Réserver <em>directement</em>.</h2>
          <div style={{ marginTop: 8, marginBottom: 24 }}><Lines count={2} widths={['100%','80%']} h={7} /></div>
          {/* Bloc embedded booking platform */}
          <div style={{
            height: 100, border: '1px solid var(--line-strong)', borderRadius: 4,
            background: 'var(--paper)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <span className="eyebrow" style={{ color: 'var(--muted)' }}>Plateforme de réservation · intégrée</span>
          </div>
        </div>

        {/* Refuge en pratique */}
        <aside style={{ display: 'flex', flexDirection: 'column', gap: 28 }}>
          <div>
            <div className="eyebrow">À savoir</div>
            <h3 className="serif" style={{ fontSize: 30, margin: '10px 0 16px' }}>Le refuge <em>en pratique</em>.</h3>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {['Capacité','Repas','Couverture','Eau','Annulation'].map(k => (
                <div key={k} style={{ display: 'grid', gridTemplateColumns: '110px 1fr', gap: 16, paddingBottom: 14, borderBottom: '1px solid var(--line)' }}>
                  <span className="eyebrow">{k}</span>
                  <Lines count={1} widths={['100%']} h={7} />
                </div>
              ))}
            </div>
          </div>
          <div style={{ background: '#e9e7e0', borderRadius: 4, padding: 22 }}>
            <div className="eyebrow">Conditions</div>
            <div style={{ marginTop: 12 }}><Lines count={3} widths={['100%','94%','70%']} h={7} /></div>
          </div>
        </aside>
      </section>

      {/* Bandeau CTA "Prêt à réserver" — commenté pour réutilisation éventuelle */}
      {false && (
        <div style={{ margin: '0 8% 110px', padding: '48px 50px', background: 'var(--ink)', borderRadius: 4, display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 24 }}>
          <div>
            <h3 className="serif" style={{ fontSize: 38, margin: 0, color: '#f4f3ef' }}>Prêt à réserver ?</h3>
            <div style={{ marginTop: 12, width: 280 }}><Lines count={1} widths={['100%']} h={7} /></div>
          </div>
          <button className="btn" style={{ background: '#f4f3ef', borderColor: '#f4f3ef' }}>Réserver une nuitée →</button>
        </div>
      )}

      <Footer onNav={onNav} />
    </div>
  );
}

function PageContact({ onNav }) {
  return (
    <div>
      <section style={{ padding: '130px 8% 40px' }}>
        <div className="eyebrow">04 / Contact & accès</div>
        <h1 className="serif" style={{ fontSize: 84, margin: '14px 0 0' }}>Comment <em>nous trouver</em>.</h1>
      </section>

      {/* map */}
      <section style={{ padding: '0 8%' }}>
        <div style={{ height: 460, borderRadius: 4, overflow: 'hidden', border: '1px solid var(--line-strong)', position: 'relative', background: 'repeating-linear-gradient(45deg, transparent 0 20px, rgba(0,0,0,0.035) 20px 21px), #e9e8e1' }}>
          <svg width="100%" height="100%" viewBox="0 0 1000 460" preserveAspectRatio="none" style={{ position: 'absolute', inset: 0 }}>
            {[...Array(7)].map((_, i) => { const r = 50 + i*48; return <ellipse key={i} cx="600" cy="210" rx={r*1.2} ry={r*0.7} fill="none" stroke="#a8a59b" strokeWidth="1" />; })}
            <path d="M 0 380 Q 200 360 350 400 T 700 420 T 1000 460" fill="none" stroke="#9fb0bd" strokeWidth="3" />
            <path d="M 100 440 Q 300 400 480 360 T 600 210" fill="none" stroke="#8a887f" strokeWidth="1.5" strokeDasharray="5 5" />
          </svg>
          <div style={{ position: 'absolute', top: '40%', left: '60%', transform: 'translate(-50%,-100%)' }}>
            <div style={{ background: 'var(--paper)', border: '1px solid var(--line-strong)', borderRadius: 4, padding: '9px 13px', whiteSpace: 'nowrap', boxShadow: '0 8px 22px -10px rgba(0,0,0,0.3)' }}>
              <span className="serif" style={{ fontStyle: 'italic', fontSize: 16 }}>Refuge du Nid d'Aigle</span>
            </div>
            <div style={{ width: 1, height: 16, background: 'var(--ink)', margin: '0 auto' }} />
            <div style={{ width: 12, height: 12, borderRadius: 99, background: 'var(--ink)', margin: '0 auto' }} />
          </div>
          <div className="chip" style={{ position: 'absolute', bottom: 16, left: 16 }}>Carte indicative · Aperçu</div>
        </div>
      </section>

      {/* access + coords */}
      <section style={{ padding: '70px 8% 110px', display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 70 }}>
        <div>
          <div className="eyebrow">Accès</div>
          <h2 className="serif" style={{ fontSize: 48, margin: '12px 0 30px' }}>Deux <em>chemins</em> jusqu'au refuge.</h2>
          {[['01','Tramway du Mont-Blanc','Recommandé'],['02','Randonnée — sentier du Mont Lachat','Saison été']].map(([n,t,tag]) => (
            <div key={n} style={{ display: 'grid', gridTemplateColumns: '60px 1fr auto', gap: 20, padding: '26px 0', borderTop: '1px solid var(--line-strong)', alignItems: 'start' }}>
              <span className="eyebrow">{n}</span>
              <div>
                <div className="serif" style={{ fontSize: 26 }}>{t}</div>
                <div style={{ margin: '12px 0' }}><Lines count={3} widths={['100%','92%','64%']} h={7} /></div>
              </div>
              <span className="chip">{tag}</span>
            </div>
          ))}
          <div style={{ borderTop: '1px solid var(--line-strong)' }} />
        </div>
        <aside>
          <div className="eyebrow">Coordonnées</div>
